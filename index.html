<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質問募集フォーム！ラジカセ・ステーション</title>
    <!-- 楽しげで丸みのある日本語フォント「Mochiy Pop One」とポップな英字フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Fredoka:wght@400;600&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <!-- アイコン用のFontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 1. 全体のポップなセットアップ */
        * {
            box-sizing: border-box;
            font-family: 'Mochiy Pop One', 'Fredoka', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px 10px;
            min-height: 100vh;
            background-color: #E0F2FE; /* さわやかで楽しげなパステルスカイブルー（無地） */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 飛び交うポップな音符デコレーション（青の同系色ベース） */
        .bg-deco {
            position: absolute;
            color: rgba(56, 189, 248, 0.35); /* シアンブルーをデフォルトに */
            animation: float-around 6s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        /* 個別の音符の位置・サイズ・カラー・ディレイ設定（青の同系色グラデーションで統一！） */
        .bg-deco-1 { top: 8%; left: 8%; font-size: 42px; animation-delay: 0s; color: rgba(96, 165, 250, 0.35); } /* パステルブルー */
        .bg-deco-2 { top: 12%; right: 10%; font-size: 36px; animation-delay: 1.5s; color: rgba(56, 189, 248, 0.4); } /* シアンブルー */
        .bg-deco-3 { bottom: 15%; left: 6%; font-size: 48px; animation-delay: 3s; color: rgba(129, 140, 248, 0.45); } /* ラベンダーブルー */
        .bg-deco-4 { bottom: 8%; right: 8%; font-size: 38px; animation-delay: 4.5s; color: rgba(147, 197, 253, 0.35); } /* ライトスカイブルー */
        
        /* 追加分の音符たち */
        .bg-deco-5 { top: 40%; left: 4%; font-size: 34px; animation-delay: 2.5s; color: rgba(14, 165, 233, 0.3); } /* ディープスカイブルー */
        .bg-deco-6 { top: 45%; right: 5%; font-size: 44px; animation-delay: 0.8s; color: rgba(37, 99, 235, 0.3); } /* ロイヤルブルー */
        .bg-deco-7 { top: 25%; left: 22%; font-size: 30px; animation-delay: 5.2s; color: rgba(129, 140, 248, 0.35); } /* ラベンダーブルー */
        .bg-deco-8 { top: 20%; right: 25%; font-size: 32px; animation-delay: 3.7s; color: rgba(56, 189, 248, 0.3); } /* シアンブルー */
        .bg-deco-9 { bottom: 35%; left: 15%; font-size: 38px; animation-delay: 1.9s; color: rgba(96, 165, 250, 0.4); } /* パステルブルー */
        .bg-deco-10 { bottom: 30%; right: 18%; font-size: 34px; animation-delay: 4.1s; color: rgba(14, 165, 233, 0.35); } /* ディープスカイブルー */

        @keyframes float-around {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(20deg) scale(1.2); }
        }

        /* スマホ共有ボタン（右上配置のフローティングデザイン） */
        .share-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333;
            color: #fff;
            border: 3px solid #333;
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: all 0.2s;
        }

        .share-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
            background-color: #444;
        }

        .share-trigger:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.15);
        }

        /* メインコンテナ */
        .container {
            width: 100%;
            max-width: 550px;
            z-index: 1;
            padding: 10px;
            margin-top: 30px; /* シェアボタン用のマージン */
        }

        /* 2. ヘッダー：ラジカセ（Boombox）とON AIR風ランプ */
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        /* ビビッドなラジカセSVGアート（モノトーン仕様） */
        .boombox-illustration {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 8px 0px #333);
            margin-bottom: 15px;
            transition: transform 0.3s;
        }

        /* ラジカセがノリノリで動くアニメーション */
        .boombox-illustration:hover, .playing-beat {
            animation: bounce-beat 0.6s infinite alternate ease-in-out;
        }

        @keyframes bounce-beat {
            0% { transform: translateY(0) scale(1) rotate(-3deg); }
            100% { transform: translateY(-10px) scale(1.05) rotate(3deg); }
        }

        /* ネオンポップなON AIRバッジ */
        .neon-on-air {
            display: inline-block;
            background-color: #333;
            border: 3px solid #333;
            border-radius: 50px;
            padding: 5px 20px;
            box-shadow: 0 4px 0px #333;
            margin-bottom: 10px;
            transform: rotate(-2deg);
        }

        /* あたたかみのあるオレンジに輝くネオンテキスト */
        .neon-text {
            color: #FF823A; /* 温かみのあるネオンオレンジ */
            font-size: 16px;
            letter-spacing: 3px;
            font-weight: bold;
            animation: neon-blink 1.5s infinite alternate;
        }

        @keyframes neon-blink {
            0%, 100% { text-shadow: 0 0 5px #FF823A, 0 0 12px #FF823A, 0 0 20px rgba(255, 130, 58, 0.5); color: #FF823A; }
            50% { text-shadow: none; color: #FFE4D6; } /* 明滅時に少し淡いオレンジへシフト */
        }

        .title {
            font-size: 28px;
            color: #333;
            margin: 5px 0;
            text-shadow: 2px 2px 0px #FFF, 5px 5px 0px #FF823A;
            letter-spacing: 1px;
        }

        /* 3. メインお便りフォーム */
        .card {
            background-color: #FFFFFF;
            border: 4px solid #333;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 8px 8px 0px #333;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        /* カセットテープの穴っぽいデザインアクセント */
        .card::before {
            content: '';
            position: absolute;
            top: 15px;
            right: 25px;
            width: 30px;
            height: 10px;
            background: repeating-linear-gradient(90deg, #333, #333 4px, transparent 4px, transparent 8px);
            opacity: 0.2;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: #FF823A;
            font-size: 20px;
        }

        /* 入力エリアのスタイル */
        .input-field {
            width: 100%;
            background-color: #F9FAFB;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: all 0.2s;
            font-family: sans-serif;
            font-weight: bold;
        }

        .input-field:focus {
            background-color: #F0F9FF;
            border-color: #38BDF8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        textarea.input-field {
            height: 130px;
            resize: none;
        }

        /* 送信ボタン（お便りを送る） */
        .btn-submit {
            width: 100%;
            background-color: #FF823A;
            color: white;
            border: 3px solid #333;
            border-radius: 16px;
            padding: 16px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 0px #333;
            transition: all 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #FFA066;
            transform: translateY(2px);
            box-shadow: 0 4px 0px #333;
        }

        .btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #333;
        }

        .btn-submit:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 0px #333 !important;
        }

        /* 4. なじみの良い爽やかな質問例コーナー（青の類似色） */
        .examples-card {
            background-color: #BFDBFE; /* 優しくなじむパステルブルー */
            border: 4px solid #333;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 6px 6px 0px #333;
            color: #333; /* 文字色をダークカラーにして読みやすく */
            position: relative;
        }

        .examples-title {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .examples-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .example-item {
            background-color: #FFFFFF; /* 不透明な白にしてカード感を強調 */
            border: 2px solid #333;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #333; /* テキストを読みやすく */
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #333;
            transition: transform 0.2s;
        }

        .example-item:hover {
            transform: scale(1.02);
            background-color: #F3F4F6;
        }

        .example-item:last-child {
            margin-bottom: 0;
        }

        .example-icon {
            font-size: 18px;
            color: #FF823A; /* オレンジ色に統一してまとまりを良く */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
        }

        /* 5. お便り送信後のハッピー完了画面 */
        .success-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 60px;
            color: #6EE7B7;
            margin-bottom: 20px;
            animation: bounce 0.8s infinite alternate ease-in-out;
            display: inline-block;
            filter: drop-shadow(3px 3px 0 #333);
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .success-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-back {
            background-color: #6EE7B7;
            color: #333;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0px #333;
            transition: all 0.1s;
        }

        .btn-back:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #333;
        }

        /* 6. QRコードポップアップモーダル */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #fff;
            border: 4px solid #333;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 380px;
            box-shadow: 8px 8px 0px #333;
            text-align: center;
            transform: translateY(-20px);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .modal-title {
            font-size: 18px;
            color: #333;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .qr-wrapper {
            background-color: #f3f4f6;
            border: 3px dashed #ccc;
            border-radius: 16px;
            padding: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .qr-code-img {
            width: 180px;
            height: 180px;
            display: block;
        }

        .modal-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- スマホ共有を誘うかわいいQRコードトリガー -->
    <button class="share-trigger" onclick="openQRModal()">
        <i class="fa-solid fa-qrcode"></i> スマホで送る
    </button>

    <!-- 楽しさを演出する飛び交う音符やハートたち（青の同系色で統一！） -->
    <div class="bg-deco bg-deco-1"><i class="fa-solid fa-music"></i></div>
    <div class="bg-deco bg-deco-2"><i class="fa-solid fa-note-sticky"></i></div>
    <div class="bg-deco bg-deco-3"><i class="fa-solid fa-radio"></i></div>
    <div class="bg-deco bg-deco-4"><i class="fa-solid fa-heart"></i></div>
    
    <!-- 追加した音符たち -->
    <div class="bg-deco bg-deco-5"><i class="fa-solid fa-volume-high"></i></div>
    <div class="bg-deco bg-deco-6"><i class="fa-solid fa-music"></i></div>
    <div class="bg-deco bg-deco-7"><i class="fa-solid fa-heart"></i></div>
    <div class="bg-deco bg-deco-8"><i class="fa-solid fa-sliders"></i></div>
    <div class="bg-deco bg-deco-9"><i class="fa-solid fa-note-sticky"></i></div>
    <div class="bg-deco bg-deco-10"><i class="fa-solid fa-radio"></i></div>

    <div class="container">
        <!-- ヘッダーエリア -->
        <div class="header">
            <!-- モノトーン化されたラジカセ（Boombox）のSVGアート -->
            <svg class="boombox-illustration" id="mainBoombox" viewBox="0 0 200 130">
                <!-- アンテナ -->
                <line x1="40" y1="35" x2="20" y2="10" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                <circle cx="20" cy="10" r="5" fill="#333" stroke="#333" stroke-width="2"/>
                
                <!-- 持ち手 -->
                <path d="M 50,35 L 50,18 C 50,14 150,14 150,18 L 150,35" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                
                <!-- 本体ボディ（シルバーグレー） -->
                <rect x="15" y="35" width="170" height="85" rx="18" fill="#E5E7EB" stroke="#333" stroke-width="5"/>
                
                <!-- 上部ダイヤル/スイッチボタン（白・グレー） -->
                <rect x="35" y="27" width="20" height="8" rx="2" fill="#FFFFFF" stroke="#333" stroke-width="3"/>
                <rect x="65" y="27" width="20" height="8" rx="2" fill="#9CA3AF" stroke="#333" stroke-width="3"/>
                <rect x="115" y="27" width="50" height="8" rx="2" fill="#333" stroke="#333" stroke-width="2"/>
                
                <!-- スピーカー（左・右 - クールなモノトーン仕様） -->
                <circle cx="50" cy="82" r="26" fill="#333"/>
                <circle cx="50" cy="82" r="22" fill="#F3F4F6" stroke="#333" stroke-width="3"/>
                <circle cx="50" cy="82" r="10" fill="#333"/>
                
                <circle cx="150" cy="82" r="26" fill="#333"/>
                <circle cx="150" cy="82" r="22" fill="#F3F4F6" stroke="#333" stroke-width="3"/>
                <circle cx="150" cy="82" r="10" fill="#333"/>
                
                <!-- カセットデッキ（中央） -->
                <rect x="85" y="65" width="30" height="22" rx="4" fill="#9CA3AF" stroke="#333" stroke-width="3"/>
                <!-- カセット窓の中のテープリール -->
                <circle cx="94" cy="76" r="3" fill="#333"/>
                <circle cx="106" cy="76" r="3" fill="#333"/>
                <rect x="91" y="81" width="18" height="3" fill="#4B5563"/>
            </svg>

            <div>
                <!-- ON AIRランプエリア（温かみのあるオレンジ色のネオン明滅スタイル） -->
                <div class="neon-on-air">
                    <span class="neon-text"><i class="fa-solid fa-bolt"></i> ON AIR <i class="fa-solid fa-bolt"></i></span>
                </div>
            </div>
            <!-- タイトル -->
            <h1 class="title">質問募集フォーム</h1>
        </div>

        <!-- お便り入力カード -->
        <div class="card" id="formCard">
            <form id="radioForm" onsubmit="handleFormSubmit(event)">
                <!-- ラジオネーム入力 -->
                <div class="form-group">
                    <label class="form-label" for="radioName">
                        <i class="fa-solid fa-user-ninja"></i> ラジオネーム
                    </label>
                    <input class="input-field" type="text" id="radioName" placeholder="（例）コタツねこ 🐾" required>
                </div>

                <!-- 質問内容入力 -->
                <div class="form-group">
                    <label class="form-label" for="message">
                        <i class="fa-solid fa-comment-dots"></i> お便り・しつもん
                    </label>
                    <textarea class="input-field" id="message" placeholder="聞きたいことや、相談したいことを自由に書いてね！" required></textarea>
                </div>

                <!-- 送信ボタン -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    お便りを送る <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>

            <!-- 送信成功時のシミュレーション画面 -->
            <div class="success-screen" id="successScreen">
                <div class="success-icon">
                    <i class="fa-solid fa-envelope-circle-check"></i>
                </div>
                <!-- 送信完了テキストをシンプルな表示に修正しました -->
                <div class="success-text">
                    質問は無事、送信されました！📻✨
                </div>
                <button class="btn-back" onclick="resetForm()">
                    もう一度送る <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>

        <!-- 質問例（チケット風デザイン） -->
        <div class="examples-card">
            <h2 class="examples-title">
                <i class="fa-solid fa-lightbulb"></i> こんなお便りを待ってます！
            </h2>
            <ul class="examples-list">
                <li class="example-item">
                    <span class="example-icon"><i class="fa-solid fa-book-open"></i></span>
                    受験勉強はどのようにしていましたか？
                </li>
                <li class="example-item">
                    <span class="example-icon"><i class="fa-solid fa-graduation-cap"></i></span>
                    大学生活は楽しいですか？
                </li>
                <li class="example-item">
                    <span class="example-icon"><i class="fa-solid fa-face-laugh-beam"></i></span>
                    最近、楽しかったことは何ですか？
                </li>
                <li class="example-item">
                    <span class="example-icon"><i class="fa-solid fa-people-group"></i></span>
                    どんなサークルがありますか？
                </li>
            </ul>
        </div>
    </div>

    <!-- QRコード用モーダルダイアログ -->
    <div class="modal-overlay" id="qrModal" onclick="closeQRModalViaOverlay(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeQRModal()">&times;</button>
            <h3 class="modal-title"><i class="fa-solid fa-mobile-screen"></i> スマホからアクセス！</h3>
            <div class="qr-wrapper">
                <img class="qr-code-img" id="qrCodeImg" src="" alt="QR Code">
            </div>
            <p class="modal-desc">スマホのカメラで上のQRコードを読み取ると、このお便りフォームをすぐに開いて送信できます！📱✨</p>
        </div>
    </div>

    <script>
        // 【重要】Google Apps Script(GAS)のWebアプリURLをここに設定します！
        // 取得したURLを以下の "" 内に貼り付けてください。
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwIBXBDRCyTs61feCnysoIvjxxp-LYuXOnMYTBUrX_KfmONW4FN0pCSo-zZwC3eTNflOQ/exec"; 

        // ページ読み込み時にQRコード画像をセットアップ
        window.onload = function() {
            // 現在のページのURLを取得
            const currentUrl = window.location.href;
            const qrImgElement = document.getElementById('qrCodeImg');
            
            // 無料のQRコード生成APIを利用して画像をセット
            qrImgElement.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(currentUrl)}`;
        };

        // QRモーダルの開閉制御
        function openQRModal() {
            document.getElementById('qrModal').classList.add('active');
        }

        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        function closeQRModalViaOverlay(event) {
            if (event.target === document.getElementById('qrModal')) {
                closeQRModal();
            }
        }

        // お便りを送信したときのアニメーションと通信制御
        async function handleFormSubmit(event) {
            event.preventDefault(); // ページのリロードを防ぐ

            const radioName = document.getElementById('radioName').value;
            const message = document.getElementById('message').value;
            const submitBtn = document.getElementById('submitBtn');
            const boombox = document.getElementById('mainBoombox');
            const form = document.getElementById('radioForm');
            const successScreen = document.getElementById('successScreen');

            // 送信ボタンを無効化して多重送信を防ぐ
            submitBtn.disabled = true;
            submitBtn.innerHTML = `送信中... <i class="fa-solid fa-spinner fa-spin"></i>`;

            // GASのWebアプリURLがセットされている場合は、スプレッドシートへ実際に送信
            if (WEB_APP_URL && WEB_APP_URL !== "") {
                try {
                    // CORSに対応するため、formData形式でPOST送信
                    const formData = new FormData();
                    formData.append('radioName', radioName);
                    formData.append('message', message);

                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors' // ブラウザのCORSセキュリティ制約を回避
                    });

                    // 送信が完了したら成功アニメーションへ移行
                    showSuccessState(boombox, form, successScreen);
                } catch (error) {
                    console.error("送信エラーが発生しました:", error);
                    showErrorNotification();
                } finally {
                    // ボタンの状態を元に戻す
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `お便りを送る <i class="fa-solid fa-paper-plane"></i>`;
                }
            } else {
                // GASのURLが未設定の場合、テスト用の模擬送信動作をします。
                console.log("【テスト送信】URL未設定のため模擬動作中。");
                setTimeout(() => {
                    showSuccessState(boombox, form, successScreen);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `お便りを送る <i class="fa-solid fa-paper-plane"></i>`;
                }, 1000);
            }
        }

        // 成功時のステート切り替え
        function showSuccessState(boombox, form, successScreen) {
            boombox.classList.add('playing-beat');
            form.style.display = 'none';
            successScreen.style.display = 'block';
        }

        // 簡易エラーメッセージ
        function showErrorNotification() {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.bottom = '20px';
            errorDiv.style.left = '50%';
            errorDiv.style.transform = 'translateX(-50%)';
            errorDiv.style.backgroundColor = '#EF4444';
            errorDiv.style.color = '#fff';
            errorDiv.style.padding = '15px 25px';
            errorDiv.style.borderRadius = '12px';
            errorDiv.style.border = '3px solid #333';
            errorDiv.style.boxShadow = '4px 4px 0 #333';
            errorDiv.style.zIndex = '1000';
            errorDiv.style.fontWeight = 'bold';
            errorDiv.style.textAlign = 'center';
            errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> 送信に失敗しました。手順書を見直してみてね！`;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 4000);
        }

        // リセット
        function resetForm() {
            const boombox = document.getElementById('mainBoombox');
            const form = document.getElementById('radioForm');
            const successScreen = document.getElementById('successScreen');

            boombox.classList.remove('playing-beat');
            form.reset();
            form.style.display = 'block';
            successScreen.style.display = 'none';
        }
    </script>
</body>
</html>
